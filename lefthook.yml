 pre-commit:
   parallel: true
   jobs:

     - name: rubocop lint
       glob: "*.rb"
       exclude:
         - config/application.rb
         - config/routes.rb
       run: bundle exec rubocop --force-exclusion -- {all_files}

     - name: Scan for common Rails security vulnerabilities using static analysis
       run:  bundle exec bin/brakeman --no-pager --force -- {all_files}

 pull-request:
   jobs:

   - name: test
     glob: "*.rb"
     run: bundle exec rake test -- {all_files}